<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库问答系统 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e1e5e9;
        }

        .footer p {
            color: #999;
            font-size: 12px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🎓 知识库问答系统</h1>
            <p>请输入您的凭据以访问系统</p>
        </div>

        <div id="error-message" class="error-message"></div>

        <form id="login-form" onsubmit="return false;">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
            </div>

            <button type="submit" class="login-btn" onclick="handleLogin()">登录系统</button>
        </form>

        <div class="footer">
            <p>© 2026 高校知识库系统 · 内部使用</p>
        </div>
    </div>

    <!-- 调试信息显示区域 -->
    <div id="debug-modal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border: 3px solid #007bff; border-radius: 15px; z-index: 9999; box-shadow: 0 8px 30px rgba(0,0,0,0.4); text-align: center; max-width: 90%; word-break: break-all; font-family: 'Arial', sans-serif;">
        <h3 style="margin-top: 0; color: #333; font-size: 20px; margin-bottom: 15px;">🔍 调试信息</h3>
        
        <p style="text-align: left; color: #555; margin-bottom: 8px;"><strong>BOT_PRIVATE_URL 的值：</strong></p>
        <p id="debug-url" style="background: #f8f9fa; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 13px; margin: 10px 0; color: #333; border: 1px solid #dee2e6;"></p>
        
        <p id="debug-status" style="margin: 15px 0; color: #666; font-size: 14px;"></p>
        
        <div style="margin-top: 20px;">
            <button onclick="continueRedirect()" style="padding: 12px 25px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-right: 10px; transition: background 0.3s;">✅ 确认跳转</button>
            <button onclick="openInNewWindow()" style="padding: 12px 25px; background: #17a2b8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-right: 10px; transition: background 0.3s;">🔗 新窗口打开</button>
            <button onclick="cancelRedirect()" style="padding: 12px 25px; background: #dc3545; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: background 0.3s;">❌ 取消</button>
        </div>
        
        <p style="margin-top: 15px; color: #999; font-size: 12px;">提示：3秒后自动跳转</p>
    </div>

    <!-- 遮罩层 -->
    <div id="debug-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9998;"></div>

    <script src="md5.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
